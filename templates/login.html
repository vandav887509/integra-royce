<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — IGN2932M75 Bond Data</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117; --surface: #181c27; --border: #2a2f3e;
            --accent: #3b82f6; --accent2: #ef4444;
            --text: #e2e8f0; --muted: #64748b;
            --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
        }
        body { background: var(--bg); font-family: var(--sans); min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; }
        body::before { content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.4; pointer-events: none; }
        body::after { content: ''; position: fixed; width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .card { background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 48px 40px; width: 100%; max-width: 420px;
            position: relative; z-index: 1; animation: fadeUp 0.5s ease both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .logo-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
        .logo-mark { width: 36px; height: 36px; background: var(--accent); border-radius: 6px;
            display: flex; align-items: center; justify-content: center; }
        .logo-mark svg { width: 20px; height: 20px; fill: white; }
        .logo-text { font-family: var(--mono); font-size: 13px; color: var(--muted); letter-spacing: 0.05em; }
        .logo-text span { display: block; font-size: 15px; color: var(--text); font-weight: 600; }
        h1 { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
        .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
        label { display: block; font-size: 12px; font-weight: 600; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
        input { width: 100%; background: var(--bg); border: 1px solid var(--border);
            border-radius: 5px; padding: 11px 14px; color: var(--text);
            font-family: var(--mono); font-size: 14px; margin-bottom: 20px;
            outline: none; transition: border-color 0.2s; }
        input:focus { border-color: var(--accent); }
        .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
            border-radius: 5px; padding: 10px 14px; font-size: 13px;
            color: #fca5a5; margin-bottom: 20px; }
        button { width: 100%; background: var(--accent); color: white; border: none;
            border-radius: 5px; padding: 12px; font-family: var(--sans); font-size: 14px;
            font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.02em; }
        button:hover { background: #2563eb; }
        button:active { transform: scale(0.99); }
        .footer-note { text-align: center; margin-top: 24px; font-size: 11px;
            color: var(--muted); font-family: var(--mono); }
    </style>
</head>
<body>
<div class="card">
    <div class="logo-bar">
        <div class="logo-mark">
            <svg viewBox="0 0 24 24"><path d="M3 3h8v8H3zm10 0h8v8h-8zM3 13h8v8H3zm10 5h2v-2h2v2h2v2h-2v2h-2v-2h-2z"/></svg>
        </div>
        <div class="logo-text">INTEGRA<span>IGN2932M75</span></div>
    </div>
    <h1>Sign in</h1>
    <p class="subtitle">Bond Pull Data Control Charts</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username" autofocus required/>
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" required/>
        <button type="submit">Sign in →</button>
    </form>
    <p class="footer-note">Copyright &copy; Integra 2024</p>
</div>
</body>
</html>
